<!DOCTYPE html>
<html lang="ru" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Punkt</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  :root{
    --orange:#ff7a3d;--orange2:#ff9a5c;--orange-dim:rgba(255,122,61,.18);
    --accent:#36e0a0;--blue:#54a3ff;--violet:#9d7bff;
    --bad:#ff5a52;--bad-dim:rgba(255,90,82,.16);
    --radius:24px;--tap:.2s cubic-bezier(.2,.8,.3,1);--spring:.5s cubic-bezier(.22,1.2,.36,1);
  }
  html[data-theme="dark"]{
    --bg:#0c0c0e;--bg2:#0e0e0e;--card:rgba(28,28,32,.55);--card2:rgba(36,36,42,.5);--card3:rgba(48,48,56,.6);
    --line:rgba(255,255,255,.10);--line2:rgba(255,255,255,.18);--txt:#f5f5f7;--txt2:#d4d4d8;--muted:#9a9aa2;--muted2:#62626c;
    --hi:#fff;--shadow:0 20px 60px rgba(0,0,0,.5);
    --glass:linear-gradient(150deg,rgba(255,255,255,.13),rgba(255,255,255,.04) 42%,rgba(255,255,255,.02));
    --glass-card:linear-gradient(160deg,rgba(255,255,255,.10),rgba(255,255,255,.025) 50%,rgba(255,255,255,.05));
    --glass-edge:inset 0 1px 0 rgba(255,255,255,.22),inset 0 -1px 0 rgba(255,255,255,.05);
    --blur:blur(26px) saturate(1.7);--blur-strong:blur(40px) saturate(1.8);
    --hatch:repeating-linear-gradient(45deg,transparent,transparent 5px,rgba(255,255,255,.06) 5px,rgba(255,255,255,.06) 6px);
  }
  html[data-theme="light"]{
    --bg:#dcdce2;--bg2:#f6f6f8;--card:rgba(255,255,255,.6);--card2:rgba(255,255,255,.5);--card3:rgba(255,255,255,.75);
    --line:rgba(0,0,0,.08);--line2:rgba(0,0,0,.14);--txt:#0e0e12;--txt2:#2a2a2e;--muted:#6b6b73;--muted2:#a0a0a8;
    --hi:#0e0e12;--shadow:0 20px 60px rgba(40,50,80,.16);
    --glass:linear-gradient(150deg,rgba(255,255,255,.7),rgba(255,255,255,.35) 42%,rgba(255,255,255,.5));
    --glass-card:linear-gradient(160deg,rgba(255,255,255,.75),rgba(255,255,255,.45) 50%,rgba(255,255,255,.6));
    --glass-edge:inset 0 1px 0 rgba(255,255,255,.9),inset 0 -1px 0 rgba(0,0,0,.03);
    --hatch:repeating-linear-gradient(45deg,transparent,transparent 5px,rgba(0,0,0,.05) 5px,rgba(0,0,0,.05) 6px);
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;font-family:'Montserrat',-apple-system,sans-serif}
  html,body{height:100%}
  body{background:var(--bg);color:var(--txt);overscroll-behavior:none;-webkit-font-smoothing:antialiased;position:relative;overflow-x:hidden}
  body::before{content:"";position:fixed;inset:-30%;z-index:-2;pointer-events:none;
    background:radial-gradient(40% 35% at 20% 18%,rgba(255,122,61,.20),transparent 60%),radial-gradient(45% 40% at 82% 12%,rgba(120,140,255,.16),transparent 62%),radial-gradient(50% 45% at 70% 82%,rgba(157,123,255,.14),transparent 60%),radial-gradient(45% 45% at 12% 78%,rgba(90,200,255,.12),transparent 62%);
    filter:blur(40px);animation:meshmove 22s ease-in-out infinite alternate}
  html[data-theme="light"] body::before{opacity:.7}
  @keyframes meshmove{0%{transform:translate(0,0) scale(1) rotate(0)}50%{transform:translate(3%,-2%) scale(1.08) rotate(4deg)}100%{transform:translate(-2%,3%) scale(1.04) rotate(-3deg)}}
  body::after{content:"";position:fixed;inset:0;z-index:-1;pointer-events:none;background:rgba(12,12,14,.55)}
  html[data-theme="light"] body::after{background:rgba(220,220,226,.5)}
  #app{max-width:480px;margin:0 auto;min-height:100%;display:flex;flex-direction:column;position:relative}
  header{padding:18px 20px 8px;display:flex;align-items:center;gap:14px;min-height:64px}
  .back-btn{width:42px;height:42px;flex-shrink:0;border-radius:50%;border:1px solid var(--line2);background:var(--glass);backdrop-filter:var(--blur);-webkit-backdrop-filter:var(--blur);box-shadow:var(--glass-edge);color:var(--txt);font-size:22px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:var(--spring)}
  .back-btn:active{transform:scale(.88)}
  .logo{font-weight:900;font-size:26px;letter-spacing:-1.4px;line-height:1;flex:1}
  .logo span{color:var(--orange)}
  .page-title{font-weight:800;font-size:22px;letter-spacing:-.8px;flex:1}
  .head-right{display:flex;align-items:center;gap:8px}
  .sync-dot{width:9px;height:9px;border-radius:50%;background:var(--muted2);transition:.3s}
  .sync-dot.syncing{background:var(--blue);animation:pulse 1s infinite}
  .sync-dot.ok{background:var(--accent)}.sync-dot.err{background:var(--bad)}
  @keyframes pulse{50%{opacity:.4}}
  main{flex:1;padding:0 16px 50px}
  .screen{display:none}
  .screen.active{display:block;animation:glassIn .5s cubic-bezier(.22,1,.36,1)}
  @keyframes glassIn{from{opacity:0;transform:translateY(16px) scale(.98);filter:blur(4px)}to{opacity:1;transform:none;filter:none}}
  .sub{font-size:13px;color:var(--muted);margin:8px 2px 18px;line-height:1.5;font-weight:500;max-width:340px}

  .hero{padding:6px 4px 16px}
  .hero-greet{font-size:15px;font-weight:600;color:var(--muted);margin-bottom:10px}
  .pulse{display:flex;gap:8px}
  .pulse-i{flex:1;background:var(--glass);backdrop-filter:var(--blur);-webkit-backdrop-filter:var(--blur);border:1px solid var(--line2);box-shadow:var(--glass-edge);border-radius:16px;padding:13px 8px;text-align:center}
  .pulse-i b{display:block;font-size:22px;font-weight:900;letter-spacing:-1px}
  .pulse-i.acc b{color:var(--orange)}
  .pulse-i span{font-size:10.5px;color:var(--muted);font-weight:600}

  .tile{display:block;width:100%;text-align:left;border:1px solid var(--line2);border-radius:26px;cursor:pointer;background:var(--glass-card);backdrop-filter:var(--blur);-webkit-backdrop-filter:var(--blur);box-shadow:var(--glass-edge),0 10px 30px rgba(0,0,0,.28);transition:var(--spring);position:relative;overflow:hidden;color:var(--txt);padding:22px}
  .tile:active{transform:scale(.97)}
  .tile::before{content:"";position:absolute;top:0;left:0;right:0;height:50%;background:linear-gradient(180deg,rgba(255,255,255,.1),transparent);pointer-events:none}
  .tile-primary{background:var(--orange);border-color:transparent;color:#fff;margin-bottom:12px;padding:24px;box-shadow:0 14px 40px rgba(255,122,61,.35)}
  .tile-primary .tile-sub{color:rgba(255,255,255,.85)}
  .tile-primary::after{content:"";position:absolute;inset:0;background:var(--hatch);opacity:.18;pointer-events:none}
  .tile-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px}
  .tile-ic{font-size:30px;line-height:1;display:block;margin-bottom:14px}
  .tile-primary .tile-ic{margin-bottom:0;font-size:34px}
  .tile-badge{background:rgba(255,255,255,.22);color:#fff;font-size:12px;font-weight:800;padding:7px 14px;border-radius:999px}
  .tile-title{font-size:24px;font-weight:900;letter-spacing:-.8px;line-height:1.05}
  .tile-title.sm{font-size:19px}
  .tile-sub{font-size:13px;color:var(--muted);font-weight:600;margin-top:5px}
  .tile-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
  .tile-dot{position:absolute;top:20px;right:20px;min-width:24px;height:24px;padding:0 7px;background:var(--orange);color:#fff;font-size:12px;font-weight:800;border-radius:999px;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 12px rgba(255,122,61,.5)}
  .home-settings{width:100%;margin-top:6px;background:transparent;border:none;color:var(--muted);font-size:14px;font-weight:600;padding:16px;cursor:pointer;border-radius:18px}
  .home-settings:active{background:var(--card)}

  .btn{width:100%;border:none;border-radius:999px;padding:17px;font-size:15px;font-weight:800;cursor:pointer;transition:var(--spring)}
  .btn:active{transform:scale(.95)}
  .btn-primary{background:var(--hi);color:var(--bg);margin-top:14px;box-shadow:0 8px 24px rgba(0,0,0,.35),inset 0 1px 0 rgba(255,255,255,.5)}
  .btn-sec{background:var(--glass);backdrop-filter:var(--blur);-webkit-backdrop-filter:var(--blur);color:var(--txt);border:1px solid var(--line2);box-shadow:var(--glass-edge);margin-top:11px}
  .seg{display:flex;background:var(--glass);backdrop-filter:var(--blur);-webkit-backdrop-filter:var(--blur);border:1px solid var(--line2);box-shadow:var(--glass-edge);border-radius:999px;padding:4px;margin-bottom:16px;gap:2px}
  .seg button{flex:1;background:transparent;border:none;color:var(--muted);font-size:12px;font-weight:700;padding:11px;border-radius:999px;cursor:pointer;transition:var(--tap)}
  .seg button.active{background:var(--hi);color:var(--bg)}
  textarea,input.txt{width:100%;background:var(--glass-card);backdrop-filter:var(--blur);-webkit-backdrop-filter:var(--blur);border:1px solid var(--line2);box-shadow:var(--glass-edge);border-radius:var(--radius);color:var(--txt);padding:15px;font-size:15px;resize:vertical;line-height:1.5;font-weight:500;font-family:inherit}
  textarea:focus,input.txt:focus{outline:none;border-color:var(--hi)}
  .empty{text-align:center;padding:60px 24px;color:var(--muted)}
  .empty .big{font-size:46px;margin-bottom:14px;filter:grayscale(1)}
  .empty p{font-size:14px;line-height:1.65;font-weight:500}
  .danger{color:var(--bad);font-size:12px;text-align:center;width:100%;background:transparent;border:none;margin-top:24px;cursor:pointer;font-weight:700}

  .plat-seg{display:flex;gap:8px;margin-bottom:10px}
  .plat-btn{flex:1;border:1px solid var(--line2);background:var(--glass);color:var(--muted);font-size:13px;font-weight:800;padding:11px;border-radius:14px;cursor:pointer;transition:var(--spring)}
  .plat-btn:active{transform:scale(.94)}
  .plat-btn.on.threads{background:var(--violet);border-color:var(--violet);color:#fff}
  .plat-btn.on.tg{background:var(--blue);border-color:var(--blue);color:#fff}
  .charcount{text-align:right;font-size:11px;font-weight:700;color:var(--muted2);margin-top:6px}
  .charcount.over{color:var(--bad)}
  .post-row{background:var(--glass-card);backdrop-filter:var(--blur);-webkit-backdrop-filter:var(--blur);border:1px solid var(--line2);box-shadow:var(--glass-edge);border-radius:18px;padding:15px;margin-bottom:11px}
  .post-meta{display:flex;align-items:center;gap:8px;margin-bottom:9px}
  .plat-tag{font-size:10px;font-weight:800;padding:4px 10px;border-radius:999px;text-transform:uppercase;letter-spacing:.4px}
  .plat-tag.threads{background:rgba(157,123,255,.18);color:var(--violet)}.plat-tag.tg{background:rgba(84,163,255,.18);color:var(--blue)}
  .post-when{font-size:11px;color:var(--muted2);font-weight:600;margin-left:auto}
  .post-fire{color:var(--orange);font-weight:800;font-size:11px}
  .post-text{font-size:14px;line-height:1.5;font-weight:500;color:var(--txt2);white-space:pre-wrap;word-break:break-word;max-height:120px;overflow:hidden}
  .post-text.expanded{max-height:none}
  .post-actions{display:flex;gap:8px;margin-top:12px}
  .pa{flex:1;border:1px solid var(--line2);background:var(--glass);color:var(--txt);font-size:12.5px;font-weight:800;padding:11px 6px;border-radius:12px;cursor:pointer;transition:var(--spring);display:flex;align-items:center;justify-content:center;gap:5px}
  .pa:active{transform:scale(.93)}
  .pa.copy{background:var(--hi);color:var(--bg);border-color:var(--hi)}
  .pa.posted{color:var(--accent)}.pa.fire.on{background:var(--orange-dim);color:var(--orange);border-color:var(--orange)}
  .pa.del{flex:0 0 auto;color:var(--bad);width:44px}
  .open-row{display:flex;gap:8px;margin-top:8px}
  .open-btn{flex:1;border:1px solid var(--line2);background:transparent;font-size:11.5px;font-weight:700;padding:9px;border-radius:11px;cursor:pointer;text-decoration:none;text-align:center}
  .open-btn.threads{color:var(--violet)}.open-btn.tg{color:var(--blue)}

  .task-row{display:flex;align-items:center;gap:13px;background:var(--glass-card);backdrop-filter:var(--blur);-webkit-backdrop-filter:var(--blur);border:1px solid var(--line2);box-shadow:var(--glass-edge);border-radius:16px;padding:14px 16px;margin-bottom:10px;transition:var(--spring)}
  .task-row.done{opacity:.5}
  .task-check{width:28px;height:28px;border-radius:50%;border:2px solid var(--line2);flex-shrink:0;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:var(--spring);font-size:15px;color:transparent}
  .task-check.on{background:var(--accent);border-color:var(--accent);color:#06140e}
  .task-txt{flex:1;font-size:14.5px;font-weight:600}
  .task-row.done .task-txt{text-decoration:line-through}
  .task-tag{font-size:9px;font-weight:800;padding:3px 7px;border-radius:999px;text-transform:uppercase}
  .task-tag.content{background:var(--orange-dim);color:var(--orange)}
  .task-tag.sales{background:rgba(54,224,160,.16);color:var(--accent)}
  .task-tag.product{background:rgba(84,163,255,.16);color:var(--blue)}
  .task-del{background:transparent;border:none;color:var(--muted2);font-size:18px;cursor:pointer;flex-shrink:0}
  .quick-add{display:flex;gap:9px;margin-bottom:14px}
  .quick-add input{flex:1}
  .quick-add button{background:var(--hi);color:var(--bg);border:none;border-radius:16px;font-weight:900;padding:0 22px;cursor:pointer;font-size:20px}
  .tag-pick{display:flex;gap:8px;margin-bottom:14px}
  .tag-pick button{flex:1;border:1px solid var(--line2);background:var(--glass);color:var(--muted);font-size:12px;font-weight:700;padding:9px;border-radius:12px;cursor:pointer}
  .tag-pick button.on{background:var(--orange);color:#fff;border-color:var(--orange)}

  /* pomodoro */
  .timer-card{background:var(--glass-card);backdrop-filter:var(--blur);-webkit-backdrop-filter:var(--blur);border:1px solid var(--line2);box-shadow:var(--glass-edge),0 14px 40px rgba(0,0,0,.3);border-radius:28px;padding:28px 22px;margin-bottom:14px;text-align:center}
  .timer-ring{width:200px;height:200px;margin:0 auto 18px}
  .tr-time{fill:var(--txt);font-size:38px;font-weight:900}
  .tr-lbl{fill:var(--muted);font-size:13px;font-weight:700}
  .timer-zone{font-size:13px;font-weight:800;color:var(--orange);margin-bottom:18px;text-transform:uppercase;letter-spacing:.5px}
  .timer-ctrl{display:flex;gap:10px}
  .timer-ctrl button{flex:1;border:none;border-radius:16px;padding:16px;font-size:15px;font-weight:800;cursor:pointer;transition:var(--spring)}
  .timer-ctrl button:active{transform:scale(.94)}
  .tc-start{background:var(--orange);color:#fff}
  .tc-stop{background:var(--bad);color:#fff}
  .tc-reset{background:var(--glass);border:1px solid var(--line2)!important;color:var(--txt)}
  .dur-pick{display:flex;gap:8px;margin-bottom:14px}
  .dur-pick button{flex:1;border:1px solid var(--line2);background:var(--glass);color:var(--txt);font-size:14px;font-weight:800;padding:11px;border-radius:12px;cursor:pointer}
  .dur-pick button.on{background:var(--hi);color:var(--bg);border-color:var(--hi)}
  .time-bar{display:flex;height:36px;border-radius:12px;overflow:hidden;margin:6px 0 14px;background:var(--card3)}
  .time-seg{display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;color:#fff;min-width:0}
  .time-legend{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:8px}
  .tl-item{display:flex;align-items:center;gap:6px;font-size:12px;font-weight:700;color:var(--muted)}
  .tl-dot{width:10px;height:10px;border-radius:3px}

  /* calendar */
  .cal-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
  .cal-nav{width:40px;height:40px;border-radius:12px;border:1px solid var(--line2);background:var(--glass);color:var(--txt);font-size:18px;cursor:pointer}
  .cal-date{font-size:17px;font-weight:900;text-align:center;flex:1}
  .cal-date span{display:block;font-size:12px;color:var(--muted);font-weight:600}
  .call-row{display:flex;align-items:center;gap:13px;background:var(--glass-card);backdrop-filter:var(--blur);-webkit-backdrop-filter:var(--blur);border:1px solid var(--line2);box-shadow:var(--glass-edge);border-radius:16px;padding:14px 16px;margin-bottom:10px}
  .call-row.done{opacity:.62}.call-row.declined{opacity:.5}
  .call-status-btns{display:flex;gap:7px;margin-top:9px}
  .csb{border:1px solid var(--line2);background:var(--glass);color:var(--txt);font-size:11.5px;font-weight:800;padding:7px 12px;border-radius:10px;cursor:pointer;transition:var(--spring)}
  .csb:active{transform:scale(.93)}
  .csb.done{color:var(--accent);border-color:rgba(54,224,160,.4)}
  .csb.decline{color:var(--bad);border-color:rgba(255,90,82,.4)}
  .csb.reset{margin-top:8px;color:var(--muted);font-size:11px;padding:5px 10px}
  .star-btn{background:transparent;border:none;color:var(--orange);font-size:19px;cursor:pointer;flex-shrink:0;line-height:1}
  .star-btn.on{color:var(--orange)}.star-btn:not(.on){color:var(--muted2)}
  .task-row.prio{border-color:rgba(255,122,61,.4);background:linear-gradient(160deg,rgba(255,122,61,.1),var(--glass-card))}
  .call-time{font-size:17px;font-weight:900;color:var(--orange);flex-shrink:0;min-width:54px}
  .call-info{flex:1}
  .call-who{font-size:15px;font-weight:700}
  .call-note{font-size:12px;color:var(--muted);font-weight:600;margin-top:2px}
  .week-strip{display:flex;gap:6px;margin-bottom:16px}
  .wd{flex:1;aspect-ratio:.72;border-radius:14px;background:var(--glass);border:1px solid var(--line2);display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;transition:var(--tap);position:relative}
  .wd.active{background:var(--hi);color:var(--bg)}
  .wd .wd-dow{font-size:10px;font-weight:700;color:var(--muted)}
  .wd.active .wd-dow{color:var(--bg)}
  .wd .wd-num{font-size:17px;font-weight:900;margin-top:2px}
  .wd .wd-dot{position:absolute;bottom:7px;width:5px;height:5px;border-radius:50%;background:var(--orange)}
  .wd.active .wd-dot{background:var(--bg)}

  .ring-card{display:flex;align-items:center;gap:18px;background:var(--glass-card);backdrop-filter:var(--blur);-webkit-backdrop-filter:var(--blur);border:1px solid var(--line2);box-shadow:var(--glass-edge),0 10px 30px rgba(0,0,0,.28);border-radius:26px;padding:20px;margin-bottom:12px}
  .ring{width:104px;height:104px;flex-shrink:0}
  .ring .rn{fill:var(--txt);font-size:30px;font-weight:900}.ring .rl{fill:var(--muted);font-size:13px;font-weight:700}
  .ring-info{flex:1}
  .ring-label{font-size:11px;font-weight:800;color:var(--muted2);text-transform:uppercase;letter-spacing:.6px}
  .ring-val{font-size:22px;font-weight:900;letter-spacing:-.6px;margin:3px 0}
  .ring-hint{font-size:12px;color:var(--muted);font-weight:600}
  .kpi-grid{display:grid;grid-template-columns:1fr 1fr;gap:11px}
  .kpi{background:var(--glass-card);backdrop-filter:var(--blur);-webkit-backdrop-filter:var(--blur);border:1px solid var(--line2);box-shadow:var(--glass-edge);border-radius:var(--radius);padding:16px}
  .kpi .n{font-size:30px;font-weight:900;letter-spacing:-1.5px;line-height:1}
  .kpi .l{font-size:11.5px;color:var(--muted);margin-top:6px;font-weight:600}
  .kpi.orange .n{color:var(--orange)}
  .chart-card{background:var(--glass-card);backdrop-filter:var(--blur);-webkit-backdrop-filter:var(--blur);border:1px solid var(--line2);box-shadow:var(--glass-edge);border-radius:var(--radius);padding:17px 14px 12px;margin-top:11px}
  .chart-title{font-size:13px;font-weight:800;margin:0 4px 14px;display:flex;justify-content:space-between}
  .chart-title span{font-size:11px;color:var(--muted);font-weight:600}
  svg.chart{width:100%;display:block;overflow:visible}
  .bar-lbl{font-size:9px;fill:var(--muted2);font-weight:700}.bar-val{font-size:10px;fill:var(--txt);font-weight:800}

  .set-block{background:var(--glass-card);backdrop-filter:var(--blur);-webkit-backdrop-filter:var(--blur);border:1px solid var(--line2);box-shadow:var(--glass-edge);border-radius:var(--radius);padding:18px;margin-bottom:13px}
  .set-block h3{font-size:16px;font-weight:900;margin-bottom:4px}
  .set-block .d{font-size:11.5px;color:var(--muted);font-weight:500;margin-bottom:13px;line-height:1.5}

<script>
const DAY_MS=864e5,KEY="punkt_v2",REPOST_DAYS=4,THREADS_LIMIT=500;
const SB_URL="https://iipdtyxjlovgcnhzungf.supabase.co";
const SB_KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImlpcGR0eXhqbG92Z2NuaHp1bmdmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI0OTg4MjcsImV4cCI6MjA5ODA3NDgyN30.4A2HcoPyofz9ydb0p3gorPvZzRjQxE8W6tJ2iam292g";

const DEFAULTS={posts:[],tasks:[],calls:[],notes:[],leads:[],settings:{theme:"dark",haptics:true},updatedAt:0};
let state=load();
let TG_ID=null, CLOUD_READY=false;

function load(){try{const s=JSON.parse(localStorage.getItem(KEY));if(s){const m=Object.assign({},JSON.parse(JSON.stringify(DEFAULTS)),s);m.settings=Object.assign({},DEFAULTS.settings,s.settings||{});return m}}catch(e){}return JSON.parse(JSON.stringify(DEFAULTS))}
function save(){state.updatedAt=Date.now();localStorage.setItem(KEY,JSON.stringify(state));cloudPushDebounced()}
function buzz(t){if(!state.settings.haptics)return;try{const tg=window.Telegram&&window.Telegram.WebApp;if(tg&&tg.HapticFeedback){tg.HapticFeedback.impactOccurred(t||"medium");return}}catch(e){}if(navigator.vibrate)navigator.vibrate(16)}
function uid(){return Date.now()+"_"+Math.random().toString(36).slice(2,7)}
function startOfDay(ts){const d=new Date(ts);d.setHours(0,0,0,0);return d.getTime()}
function dayKey(ts){const d=new Date(ts||Date.now());return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0")}
function escapeHtml(s){return(s||"").replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]))}
function copyText(t){if(navigator.clipboard&&navigator.clipboard.writeText){navigator.clipboard.writeText(t).then(()=>toast("Скопировано ✓")).catch(()=>fbcopy(t))}else fbcopy(t)}
function fbcopy(t){const ta=document.createElement("textarea");ta.value=t;ta.style.position="fixed";ta.style.opacity=0;document.body.appendChild(ta);ta.select();try{document.execCommand("copy");toast("Скопировано ✓")}catch(e){}document.body.removeChild(ta)}
let toastT;function toast(m){const t=document.getElementById("toast");t.textContent=m;t.classList.add("show");clearTimeout(toastT);toastT=setTimeout(()=>t.classList.remove("show"),1700)}
function when(ts){const d=Date.now()-ts,h=Math.floor(d/36e5),dd=Math.floor(d/864e5);if(h<1)return"только что";if(h<24)return h+"ч назад";if(dd<7)return dd+"д назад";return new Date(ts).toLocaleDateString("ru-RU",{day:"numeric",month:"short"})}
function fmtMin(min){if(min<60)return min+"м";const h=Math.floor(min/60),m=min%60;return h+"ч"+(m?" "+m+"м":"")}

/* ===== SUPABASE (single JSON blob per user) ===== */
function sbHeaders(){return {"apikey":SB_KEY,"Authorization":"Bearer "+SB_KEY,"Content-Type":"application/json"}}
async function sbGet(path){const r=await fetch(SB_URL+"/rest/v1/"+path,{headers:sbHeaders()});if(!r.ok)throw new Error("GET "+r.status);return r.json()}
async function sbUpsert(table,rows,onConflict){const r=await fetch(SB_URL+"/rest/v1/"+table+"?on_conflict="+onConflict,{method:"POST",headers:Object.assign({"Prefer":"resolution=merge-duplicates,return=minimal"},sbHeaders()),body:JSON.stringify(rows)});if(!r.ok){const t=await r.text();throw new Error("UPSERT "+r.status+" "+t)}}
function setSyncDot(s){const el=document.getElementById("sync-dot");if(!el)return;el.className="sync-dot "+s}
async function cloudPull(){
  if(!TG_ID)return;
  const rows=await sbGet("punkt_data?tg_id=eq."+encodeURIComponent(TG_ID)+"&select=*");
  if(rows&&rows.length&&rows[0].data){
    const cloud=rows[0].data;
    // newest-wins по updatedAt
    if((cloud.updatedAt||0)>(state.updatedAt||0)){
      state=Object.assign({},JSON.parse(JSON.stringify(DEFAULTS)),cloud);
      state.settings=Object.assign({},DEFAULTS.settings,cloud.settings||{});
      localStorage.setItem(KEY,JSON.stringify(state));
    }
  }
}
async function cloudPushAll(){
  if(!TG_ID)return;
  await sbUpsert("punkt_data",[{tg_id:TG_ID,data:state,updated_at:Date.now()}],"tg_id");
}
let pushT;
function cloudPushDebounced(){
  if(!CLOUD_READY)return;
  setSyncDot("syncing");
  clearTimeout(pushT);
  pushT=setTimeout(async()=>{try{await cloudPushAll();setSyncDot("ok")}catch(e){setSyncDot("err")}},900);
}
async function initCloud(){
  try{
    const tg=window.Telegram&&window.Telegram.WebApp;
    let id=tg&&tg.initDataUnsafe&&tg.initDataUnsafe.user&&tg.initDataUnsafe.user.id;
    if(!id){ // fallback — устойчивый device id
      id=localStorage.getItem("punkt_device");
      if(!id){id="dev_"+Math.random().toString(36).slice(2,11);localStorage.setItem("punkt_device",id)}
    }
    TG_ID="punkt_"+id;
    await cloudPull();
    CLOUD_READY=true;setSyncDot("ok");
    show("home");
    // первичный пуш чтобы запись создалась
    cloudPushDebounced();
  }catch(e){CLOUD_READY=true;setSyncDot("err")}
}

/* ===== counts ===== */
function postsToday(){const t=startOfDay(Date.now());return state.posts.filter(p=>p.postedAt&&p.postedAt>=t).length}
function tasksDoneToday(){const t=startOfDay(Date.now());return state.tasks.filter(x=>x.doneAt&&x.doneAt>=t).length}
function tasksOpenToday(){const k=dayKey();return state.tasks.filter(x=>!x.done&&x.day===k).length}
function draftCount(){return state.posts.filter(p=>!p.postedAt).length}
function repostReady(){const cut=Date.now()-REPOST_DAYS*DAY_MS;return state.posts.filter(p=>p.fire&&p.postedAt&&p.postedAt<=cut&&!p.reposted)}
function callsToday(){const k=dayKey();return state.calls.filter(c=>c.day===k&&c.status==="done").length}
function notesActive(){return state.notes.filter(n=>!n.done).length}
function leadsActive(){return state.leads.filter(l=>!["paid","lost"].includes(l.stage)).length}
// переносим невыполненные задачи с прошлых дней на сегодня
function carryOverTasks(){
  const today=dayKey();let moved=false;
  state.tasks.forEach(t=>{if(!t.done&&t.day&&t.day<today){t.day=today;t.carried=true;moved=true}});
  if(moved)save();
}

/* ===== HOME ===== */
const TITLES={write:"Новый пост",posts:"Посты",tasks:"Задачи",calendar:"Календарь",analytics:"Итоги дня",threads:"Threads",notes:"Заметки",leads:"Лиды",funnel:"Воронка",settings:"Настройки"};
function renderHome(){
  const body=document.getElementById("home-body");
  const hour=new Date().getHours();
  const greet=hour<6?"Доброй ночи":hour<12?"Доброе утро":hour<18?"Добрый день":"Добрый вечер";
  const ready=repostReady().length;
  const todayCalls=state.calls.filter(c=>c.day===dayKey()).sort((a,b)=>a.time.localeCompare(b.time));
  const nextCall=todayCalls.find(c=>!c.status);
  body.innerHTML=`
    <div class="hero">
      <div class="hero-greet">${greet} 👋</div>
      <div class="pulse">

    <textarea id="post-input" style="min-height:220px" placeholder="${writePlat==='threads'?'Короткий пост для Threads…':'Длинный пост для Telegram…'}"></textarea>

/* ===== POSTS ===== */
let postFilter="drafts";
function renderPosts(){
  const body=document.getElementById("posts-body");
  let arr;
  if(postFilter==="drafts")arr=state.posts.filter(p=>!p.postedAt);
  else if(postFilter==="repost")arr=repostReady();
  else arr=state.posts.filter(p=>p.postedAt);
  arr=arr.slice().sort((a,b)=>(b.createdAt||0)-(a.createdAt||0));
  const ready=repostReady().length;
  let html=`<div class="seg"><button data-pf="drafts" class="${postFilter==='drafts'?'active':''}">Готовые</button><button data-pf="repost" class="${postFilter==='repost'?'active':''}">Перезалив${ready?" ("+ready+")":""}</button><button data-pf="posted" class="${postFilter==='posted'?'active':''}">Опубликовано</button></div>`;
  if(!arr.length)html+=`<div class="empty"><div class="big">📝</div><p>${postFilter==='drafts'?'Нет готовых постов. Напиши новый.':postFilter==='repost'?'Залетевшие появятся здесь через '+REPOST_DAYS+' дня — чтобы перезалить.':'Тут будут опубликованные.'}</p></div>`;
  else html+=arr.map(p=>{const isDraft=!p.postedAt;
    return `<div class="post-row"><div class="post-meta"><span class="plat-tag ${p.plat}">${p.plat==='threads'?'Threads':'Telegram'}</span>${p.fire?'<span class="post-fire">🔥 залетел</span>':''}<span class="post-when">${isDraft?'черновик':when(p.postedAt)}</span></div>
      <div class="post-text" data-exp="${p.id}">${escapeHtml(p.text)}</div>
      <div class="post-actions"><button class="pa copy" data-copy="${p.id}">📋 Копировать</button>${isDraft?`<button class="pa posted" data-posted="${p.id}">✓ Опубликовал</button>`:`<button class="pa fire ${p.fire?'on':''}" data-fire="${p.id}">🔥</button>${postFilter==='repost'?`<button class="pa posted" data-repost="${p.id}">↻ Перезалить</button>`:''}`}<button class="pa del" data-del="${p.id}">🗑</button></div>
      ${isDraft?`<div class="open-row"><a class="open-btn ${p.plat}" href="${p.plat==='threads'?'https://www.threads.net':'https://web.telegram.org'}" target="_blank" rel="noopener">↗ Открыть ${p.plat==='threads'?'Threads':'Telegram'}</a></div>`:''}</div>`;
  }).join("");
  body.innerHTML=html;
  body.querySelectorAll("[data-pf]").forEach(b=>b.onclick=()=>{postFilter=b.dataset.pf;renderPosts()});
  body.querySelectorAll("[data-exp]").forEach(el=>el.onclick=()=>el.classList.toggle("expanded"));
  body.querySelectorAll("[data-copy]").forEach(b=>b.onclick=()=>{const p=state.posts.find(x=>x.id===b.dataset.copy);copyText(p.text);buzz("light")});
  body.querySelectorAll("[data-posted]").forEach(b=>b.onclick=()=>{const p=state.posts.find(x=>x.id===b.dataset.posted);p.postedAt=Date.now();save();buzz("medium");toast("Опубликовано ✓");renderPosts()});
  body.querySelectorAll("[data-fire]").forEach(b=>b.onclick=()=>{const p=state.posts.find(x=>x.id===b.dataset.fire);p.fire=!p.fire;save();buzz("light");renderPosts()});
  body.querySelectorAll("[data-repost]").forEach(b=>b.onclick=()=>{const p=state.posts.find(x=>x.id===b.dataset.repost);p.reposted=true;state.posts.unshift({id:uid(),text:p.text,plat:p.plat,createdAt:Date.now(),postedAt:null,fire:false,reposted:false});save();buzz("medium");toast("В готовые — подправь и постни");postFilter="drafts";renderPosts()});
  body.querySelectorAll("[data-del]").forEach(b=>b.onclick=()=>{if(confirm("Удалить пост?")){state.posts=state.posts.filter(x=>x.id!==b.dataset.del);save();renderPosts()}});
}

/* ===== TASKS (по дням, с переносом) ===== */
let taskDay=dayKey();
function renderTasks(){
  carryOverTasks();
  const body=document.getElementById("tasks-body");
  const isToday=taskDay===dayKey();
  const dObj=new Date(taskDay+"T00:00:00");
  const dLabel=isToday?"Сегодня":dObj.toLocaleDateString("ru-RU",{weekday:"long",day:"numeric",month:"long"});
  let open=state.tasks.filter(t=>!t.done&&t.day===taskDay);
  open.sort((a,b)=>(b.priority?1:0)-(a.priority?1:0)||(a.createdAt||0)-(b.createdAt||0));
  const done=state.tasks.filter(t=>t.done&&t.day===taskDay);
  let html=`
    <div class="cal-head" style="margin-bottom:16px">
      <button class="cal-nav" id="task-prev">‹</button>
      <div class="cal-date">${dLabel.charAt(0).toUpperCase()+dLabel.slice(1)}<span>${open.length} задач${done.length?" · "+done.length+" готово":""}</span></div>
      <button class="cal-nav" id="task-next">›</button>
    </div>
    <div class="quick-add"><input class="txt" id="task-input" placeholder="Новая задача${isToday?" на сегодня":""}"><button id="task-add">＋</button></div>`;
  if(!open.length&&!done.length)html+=`<div class="empty"><div class="big">✅</div><p>${isToday?"Задач нет. Добавь что нужно сделать сегодня.":"На этот день задач нет."}</p></div>`;
  html+=open.map(t=>`<div class="task-row${t.priority?' prio':''}"><div class="task-check" data-done="${t.id}"></div><div class="task-txt">${t.carried?'<span style="color:var(--muted2);font-size:11px">↩ перенесено · </span>':''}${escapeHtml(t.text)}</div><button class="star-btn ${t.priority?'on':''}" data-star="${t.id}">${t.priority?'★':'☆'}</button>${t.tag&&t.tag!=='other'?`<span class="task-tag ${t.tag}">${({content:'контент',sales:'продажи',product:'продукт'})[t.tag]}</span>`:''}<button class="task-del" data-del="${t.id}">×</button></div>`).join("");
  if(done.length)html+=`<div class="sub" style="margin:18px 2px 10px">Сделано (${done.length})</div>`+done.map(t=>`<div class="task-row done"><div class="task-check on" data-undone="${t.id}">✓</div><div class="task-txt">${escapeHtml(t.text)}</div><button class="task-del" data-del="${t.id}">×</button></div>`).join("");
  html+=`<div class="tag-pick" style="margin-top:16px"><span style="font-size:11px;color:var(--muted);font-weight:700;align-self:center;margin-right:4px">Тег:</span><button data-tt="other" class="${newTaskTag==='other'?'on':''}">Обычная</button><button data-tt="content" class="${newTaskTag==='content'?'on':''}">Контент</button><button data-tt="sales" class="${newTaskTag==='sales'?'on':''}">Продажи</button><button data-tt="product" class="${newTaskTag==='product'?'on':''}">Продукт</button></div>`;
  body.innerHTML=html;
  document.getElementById("task-prev").onclick=()=>{const d=new Date(taskDay+"T00:00:00");d.setDate(d.getDate()-1);taskDay=dayKey(d.getTime());renderTasks()};
  document.getElementById("task-next").onclick=()=>{const d=new Date(taskDay+"T00:00:00");d.setDate(d.getDate()+1);taskDay=dayKey(d.getTime());renderTasks()};
  body.querySelectorAll("[data-tt]").forEach(b=>b.onclick=()=>{newTaskTag=b.dataset.tt;renderTasks();const i=document.getElementById("task-input");if(i)i.focus()});
  const inp=document.getElementById("task-input"),add=()=>{const t=inp.value.trim();if(!t)return;state.tasks.unshift({id:uid(),text:t,tag:newTaskTag,day:taskDay,priority:false,done:false,createdAt:Date.now()});save();buzz("light");inp.value="";renderTasks();const i=document.getElementById("task-input");if(i)i.focus()};
  document.getElementById("task-add").onclick=add;inp.onkeydown=e=>{if(e.key==="Enter")add()};
  body.querySelectorAll("[data-done]").forEach(b=>b.onclick=()=>{const t=state.tasks.find(x=>x.id===b.dataset.done);t.done=true;t.doneAt=Date.now();save();buzz("medium");renderTasks()});
  body.querySelectorAll("[data-undone]").forEach(b=>b.onclick=()=>{const t=state.tasks.find(x=>x.id===b.dataset.undone);t.done=false;t.doneAt=null;save();renderTasks()});
  body.querySelectorAll("[data-star]").forEach(b=>b.onclick=()=>{const t=state.tasks.find(x=>x.id===b.dataset.star);t.priority=!t.priority;save();buzz("light");renderTasks()});
  body.querySelectorAll("[data-del]").forEach(b=>b.onclick=()=>{state.tasks=state.tasks.filter(x=>x.id!==b.dataset.del);save();renderTasks()});
}
let newTaskTag="other";


/* ===== CALENDAR (созвоны) ===== */
let calSel=dayKey();
function renderCalendar(){
  const body=document.getElementById("calendar-body");
  // week strip centered on selected
  const sel=new Date(calSel+"T00:00:00");
  const week=[];const base=new Date(sel);base.setDate(base.getDate()-3);
  for(let i=0;i<7;i++){const d=new Date(base);d.setDate(base.getDate()+i);week.push(d)}
  const DOW=["вс","пн","вт","ср","чт","пт","сб"];
  const dayCalls=state.calls.filter(c=>c.day===calSel).sort((a,b)=>a.time.localeCompare(b.time));
  const selD=new Date(calSel+"T00:00:00");
  const dateLabel=selD.toLocaleDateString("ru-RU",{weekday:"long",day:"numeric",month:"long"});
  body.innerHTML=`
    <div class="cal-head">
      <button class="cal-nav" id="cal-prev">‹</button>
      <div class="cal-date">${calSel===dayKey()?'Сегодня':dateLabel.split(",")[0]}<span>${selD.toLocaleDateString("ru-RU",{day:"numeric",month:"long"})}</span></div>
      <button class="cal-nav" id="cal-next">›</button>
    </div>
    <div class="week-strip">${week.map(d=>{const k=dayKey(d.getTime());const has=state.calls.some(c=>c.day===k);return `<div class="wd ${k===calSel?'active':''}" data-day="${k}"><span class="wd-dow">${DOW[d.getDay()]}</span><span class="wd-num">${d.getDate()}</span>${has?'<span class="wd-dot"></span>':''}</div>`}).join("")}</div>
    ${dayCalls.length?dayCalls.map(c=>`<div class="call-row ${c.status||''}"><div class="call-time">${c.time}</div><div class="call-info"><div class="call-who">${escapeHtml(c.who)}${c.status==='done'?' <span style="color:var(--accent);font-size:12px">✓ провёл</span>':c.status==='declined'?' <span style="color:var(--bad);font-size:12px">✗ не провёл</span>':''}</div>${c.note?`<div class="call-note">${escapeHtml(c.note)}</div>`:''}${!c.status?`<div class="call-status-btns"><button class="csb done" data-cdone="${c.id}">провёл ✓</button><button class="csb decline" data-cdecline="${c.id}">не провёл ✗</button></div>`:`<button class="csb reset" data-creset="${c.id}">↺ сбросить</button>`}</div><button class="task-del" data-delc="${c.id}">×</button></div>`).join(""):`<div class="empty"><div class="big">📅</div><p>На этот день созвонов нет.<br>Добавь — кто и во сколько.</p></div>`}
    <button class="btn btn-primary" id="add-call">＋ Добавить созвон</button>`;
  body.querySelectorAll("[data-day]").forEach(b=>b.onclick=()=>{calSel=b.dataset.day;renderCalendar()});
  document.getElementById("cal-prev").onclick=()=>{const d=new Date(calSel+"T00:00:00");d.setDate(d.getDate()-1);calSel=dayKey(d.getTime());renderCalendar()};
  document.getElementById("cal-next").onclick=()=>{const d=new Date(calSel+"T00:00:00");d.setDate(d.getDate()+1);calSel=dayKey(d.getTime());renderCalendar()};
  body.querySelectorAll("[data-cdone]").forEach(b=>b.onclick=()=>{const c=state.calls.find(x=>x.id===b.dataset.cdone);c.status="done";save();buzz("medium");renderCalendar()});
  body.querySelectorAll("[data-cdecline]").forEach(b=>b.onclick=()=>{const c=state.calls.find(x=>x.id===b.dataset.cdecline);c.status="declined";save();buzz("light");renderCalendar()});
  body.querySelectorAll("[data-creset]").forEach(b=>b.onclick=()=>{const c=state.calls.find(x=>x.id===b.dataset.creset);c.status=null;save();renderCalendar()});
  body.querySelectorAll("[data-delc]").forEach(b=>b.onclick=()=>{state.calls=state.calls.filter(x=>x.id!==b.dataset.delc);save();renderCalendar()});
  document.getElementById("add-call").onclick=()=>openCallSheet();
}
function openCallSheet(){
  const root=document.getElementById("sheet-root");
  root.innerHTML=`<div class="sheet-overlay" id="cs-ov"><div class="sheet"><div class="sheet-grip"></div><div class="sheet-title">Новый созвон</div>
    <input class="txt" id="cs-who" placeholder="С кем (имя / @ник)" style="margin-bottom:10px">
    <input class="txt" id="cs-time" type="time" value="12:00" style="margin-bottom:10px">
    <input class="txt" id="cs-note" placeholder="Заметка (по какому поводу)" style="margin-bottom:4px">
    <button class="btn btn-primary" id="cs-ok">Добавить на ${calSel===dayKey()?'сегодня':new Date(calSel+"T00:00:00").toLocaleDateString("ru-RU",{day:"numeric",month:"long"})}</button>
  </div></div>`;
  document.getElementById("cs-ov").onclick=e=>{if(e.target.id==="cs-ov")root.innerHTML=""};
  setTimeout(()=>document.getElementById("cs-who").focus(),100);
  document.getElementById("cs-ok").onclick=()=>{const who=document.getElementById("cs-who").value.trim();const time=document.getElementById("cs-time").value;const note=document.getElementById("cs-note").value.trim();
    if(!who){toast("Укажи с кем");return}
    state.calls.push({id:uid(),day:calSel,time:time||"12:00",who,note,status:null});save();buzz("medium");root.innerHTML="";toast("Созвон добавлен");renderCalendar()};
}

/* ===== ANALYTICS ===== */
let anPeriod="today";
function renderAnalytics(){
  const body=document.getElementById("analytics-body");
  if(anPeriod==="today")return renderDaySummary(body);
  const days=anPeriod==="week"?7:30,cut=Date.now()-days*DAY_MS,cutDay=dayKey(cut);
  const postsN=state.posts.filter(p=>p.postedAt&&p.postedAt>=cut).length;
  const fireN=state.posts.filter(p=>p.fire&&p.postedAt&&p.postedAt>=cut).length;
  const tasksDone=state.tasks.filter(t=>t.done&&t.doneAt&&t.doneAt>=cut).length;
  const tasksTotal=state.tasks.filter(t=>t.day&&t.day>=cutDay).length;
  const doneRate=tasksTotal?Math.round(tasksDone/tasksTotal*100):0;
  const callsDone=state.calls.filter(c=>c.day>=cutDay&&c.status==="done").length;
  body.innerHTML=`
    <div class="seg"><button data-an="today" class="${anPeriod==='today'?'active':''}">Сегодня</button><button data-an="week" class="${anPeriod==='week'?'active':''}">Неделя</button><button data-an="month" class="${anPeriod==='month'?'active':''}">Месяц</button></div>
    <div class="kpi-grid">
      <div class="kpi orange"><div class="n">${postsN}</div><div class="l">постов</div></div>
      <div class="kpi"><div class="n">${tasksDone}</div><div class="l">задач сделано</div></div>
      <div class="kpi"><div class="n">${doneRate}%</div><div class="l">задач закрыто</div></div>
      <div class="kpi"><div class="n">${callsDone}</div><div class="l">созвонов провёл</div></div>
    </div>
    <div class="chart-card"><div class="chart-title">Посты по дням <span>7 дней</span></div>${barChart7()}</div>`;
  body.querySelectorAll("[data-an]").forEach(b=>b.onclick=()=>{anPeriod=b.dataset.an;renderAnalytics()});
}
function renderDaySummary(body){
  const posts=postsToday();
  const tasksD=tasksDoneToday();
  const tasksOpenT=tasksOpenToday();
  const tasksTot=tasksD+tasksOpenT;
  const doneRate=tasksTot?Math.round(tasksD/tasksTot*100):0;
  const callsAll=state.calls.filter(c=>c.day===dayKey());
  const callsDone=callsAll.filter(c=>c.status==="done").length;
  // словесная выжимка по факту
  const bits=[];
  if(posts)bits.push(posts+" "+plural(posts,"пост","поста","постов"));
  if(tasksD)bits.push(tasksD+" "+plural(tasksD,"задача","задачи","задач"));
  if(callsDone)bits.push(callsDone+" "+plural(callsDone,"созвон","созвона","созвонов"));
  const summary=bits.length?("Сегодня: "+bits.join(", ")+".") : "День только начался — пока ничего не отмечено.";
  body.innerHTML=`

function plural(n,one,few,many){const m=n%10,d=n%100;if(m===1&&d!==11)return one;if(m>=2&&m<=4&&(d<10||d>=20))return few;return many}
function barChart7(){
  const days=[],now=Date.now();
  for(let i=6;i>=0;i--){const d0=startOfDay(now-i*DAY_MS);days.push({t:d0,label:new Date(d0).toLocaleDateString("ru-RU",{weekday:"short"}),c:0})}
  state.posts.forEach(p=>{if(p.postedAt){const d0=startOfDay(p.postedAt),d=days.find(x=>x.t===d0);if(d)d.c++}});
  const max=Math.max(1,...days.map(d=>d.c)),W=440,H=150,pad=20,bw=42,gap=(W-pad*2-bw*7)/6;let bars="";
  days.forEach((d,i)=>{const x=pad+i*(bw+gap),bh=Math.max(d.c?6:0,(d.c/max)*(H-50)),y=H-26-bh;
    if(d.c>0){bars+=`<rect x="${x}" y="${y}" width="${bw}" height="${bh}" rx="7" fill="var(--orange)"/><text x="${x+bw/2}" y="${y-7}" text-anchor="middle" class="bar-val">${d.c}</text>`}else bars+=`<rect x="${x}" y="${H-32}" width="${bw}" height="6" rx="3" fill="var(--card3)"/>`;
    bars+=`<text x="${x+bw/2}" y="${H-9}" text-anchor="middle" class="bar-lbl">${d.label}</text>`});
  return `<svg class="chart" viewBox="0 0 ${W} ${H}">${bars}</svg>`;
}

const COLLECT_URL=SB_URL+"/functions/v1/threads-collect";
async function pullThreadsStats(){
  try{
    if(!TG_ID){return {posts:[],followers:[],err:"нет ключа"}}
    const posts=await sbGet("threads_posts?tg_id=eq."+encodeURIComponent(TG_ID)+"&order=posted_at.desc&limit=200");

function followersChart(fArr){
  if(!fArr||fArr.length<2)return `<div class="chart-card" style="margin-bottom:14px;text-align:center;padding:20px"><div style="font-size:12px;color:var(--muted);font-weight:600">График роста появится через пару дней сбора</div></div>`;
  const vals=fArr.map(x=>+x.followers);
  const min=Math.min(...vals),max=Math.max(...vals),range=Math.max(1,max-min);
  const W=440,H=120,pad=10;
  const step=fArr.length>1?(W-pad*2)/(fArr.length-1):0;
  let pts=vals.map((v,i)=>{const x=pad+i*step,y=H-pad-((v-min)/range)*(H-pad*2);return x+","+y});
  const line=pts.join(" ");
  const area=`${pad},${H-pad} ${line} ${pad+(fArr.length-1)*step},${H-pad}`;
  return `<div class="chart-card" style="margin-bottom:14px"><div class="chart-title">Рост подписчиков <span>${fArr.length} дн.</span></div>
    <svg class="chart" viewBox="0 0 ${W} ${H}"><defs><linearGradient id="thg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="rgba(157,123,255,.35)"/><stop offset="100%" stop-color="rgba(157,123,255,0)"/></linearGradient></defs><polygon points="${area}" fill="url(#thg)"/><polyline points="${line}" fill="none" stroke="var(--violet)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>${vals.map((v,i)=>{const x=pad+i*step,y=H-pad-((v-min)/range)*(H-pad*2);return i===vals.length-1?`<circle cx="${x}" cy="${y}" r="4" fill="var(--violet)"/>`:""}).join("")}</svg></div>`;
}

function fmtRemind(ts){
  const d=new Date(ts),now=new Date();
  const today=dayKey(),target=dayKey(ts);
  const tm=d.toLocaleTimeString("ru-RU",{hour:"2-digit",minute:"2-digit"});
  if(target===today)return "сегодня "+tm;
  const tmr=dayKey(Date.now()+864e5);
  if(target===tmr)return "завтра "+tm;
  return d.toLocaleDateString("ru-RU",{day:"numeric",month:"short"})+" "+tm;
}

      ${l.followAt?`<div class="lead-fu ${overdue?'over':''}">${overdue?'⚠ пора написать':'🔔 '+fmtRemind(l.followAt)}</div>`:''}
    </div>
    ${canAdvance?`<button class="lead-next" data-quickstage="${l.id}" title="Следующий этап">→</button>`:''}
  </div>`;
}
function quickAdvance(id){
  const l=state.leads.find(x=>x.id===id);if(!l)return;
  const idx=LEAD_STAGES.findIndex(s=>s.id===l.stage);
  if(idx<5){l.stage=LEAD_STAGES[idx+1].id;l.updatedAt=Date.now();save();buzz("medium");toast("→ "+stageById(l.stage).name);renderLeads()}
}

    <div class="ls-label">Заметка</div>

    <div class="ls-label">🔔 Напомнить написать (фоллоу-ап)</div>
    <div class="note-time-row" id="ls-fu">
      <button class="ntq" data-fu="0">Без напоминания</button>
      <button class="ntq" data-fu="3h">Через 3 часа</button>
      <button class="ntq" data-fu="tomorrow">Завтра</button>
      <button class="ntq" data-fu="2d">Через 2 дня</button>
      <button class="ntq" data-fu="3d">Через 3 дня</button>
      <button class="ntq" data-fu="week">Через неделю</button>
      <button class="ntq" data-fu="custom">📅 Выбрать день</button>
    </div>
    <input type="datetime-local" id="ls-fu-custom" style="display:none;margin-bottom:12px" class="txt">
    <button class="btn btn-primary" id="ls-save">${editing?"Сохранить":"Добавить лид"}</button>

  </div></div>`;
  document.getElementById("ls-ov").onclick=e=>{if(e.target.id==="ls-ov")root.innerHTML=""};
  let src=editing?editing.source:"threads",stage=editing?editing.stage:"new",fu=editing&&editing.followAt?"keep":0;
  root.querySelectorAll("[data-src]").forEach(b=>b.onclick=()=>{root.querySelectorAll("[data-src]").forEach(x=>x.classList.remove("on"));b.classList.add("on");src=b.dataset.src});
  root.querySelectorAll("[data-stage]").forEach(b=>b.onclick=()=>{root.querySelectorAll("[data-stage]").forEach(x=>x.classList.remove("on"));b.classList.add("on");stage=b.dataset.stage});
  root.querySelectorAll("[data-fu]").forEach(b=>b.onclick=()=>{root.querySelectorAll("[data-fu]").forEach(x=>x.classList.remove("on"));b.classList.add("on");fu=b.dataset.fu;
    const ct=document.getElementById("ls-fu-custom");if(fu==="custom"){ct.style.display="block";ct.focus()}else ct.style.display="none"});

    const note=document.getElementById("ls-note").value.trim();
    let followAt=editing&&fu==="keep"?editing.followAt:null;
    if(fu==="3h")followAt=Date.now()+3*36e5;
    else if(fu==="tomorrow"){const d=new Date();d.setDate(d.getDate()+1);d.setHours(10,0,0,0);followAt=d.getTime()}
    else if(fu==="2d"){const d=new Date();d.setDate(d.getDate()+2);d.setHours(10,0,0,0);followAt=d.getTime()}

    else if(fu==="week"){const d=new Date();d.setDate(d.getDate()+7);d.setHours(10,0,0,0);followAt=d.getTime()}

    if(editing){Object.assign(editing,{name,source:src,stage,note,followAt,updatedAt:Date.now()})}
    else{state.leads.unshift({id:uid(),name,source:src,stage,note,followAt,createdAt:Date.now(),updatedAt:Date.now()})}

  const del=document.getElementById("ls-del");if(del)del.onclick=()=>{if(confirm("Удалить лид?")){state.leads=state.leads.filter(x=>x.id!==id);save();root.innerHTML="";renderLeads()}};

/* ===== ВОРОНКА (визуализация) ===== */
let funnelPeriod="all";
function renderFunnel(){
  const body=document.getElementById("funnel-body");
  const cut=funnelPeriod==="week"?Date.now()-7*864e5:funnelPeriod==="month"?Date.now()-30*864e5:funnelPeriod==="q"?Date.now()-90*864e5:0;
  const leads=state.leads.filter(l=>!cut||(l.createdAt||0)>=cut);
  const funnelOrder=["new","noreply","talking","call","offer","paid"];
  const stageIdx=id=>funnelOrder.indexOf(id);
  const counts={};
  funnelOrder.forEach((s,i)=>{counts[s]=leads.filter(l=>{const li=stageIdx(l.stage);return li>=i}).length});
  const lost=leads.filter(l=>l.stage==="lost").length;
  const total=leads.length;
  const paid=counts["paid"]||0;
  const conv=total?Math.round(paid/total*100):0;
  body.innerHTML=`
    <div class="seg"><button data-fp="week" class="${funnelPeriod==='week'?'active':''}">Неделя</button><button data-fp="month" class="${funnelPeriod==='month'?'active':''}">Месяц</button><button data-fp="q" class="${funnelPeriod==='q'?'active':''}">3 мес</button><button data-fp="all" class="${funnelPeriod==='all'?'active':''}">Всё</button></div>
    <div class="fn-hero">
      <div class="fn-hero-i"><b>${total}</b><span>всего лидов</span></div>
      <div class="fn-hero-i"><b style="color:var(--accent)">${paid}</b><span>клиентов</span></div>
      <div class="fn-hero-i"><b style="color:var(--orange)">${conv}%</b><span>конверсия</span></div>
    </div>
    ${total>0?funnelSVG(funnelOrder,counts):`<div class="empty"><div class="big">📈</div><p>Нет лидов за период. Добавь лидов — воронка оживёт.</p></div>`}
    ${lost>0?`<div class="fn-lost">💔 Слились по пути: <b>${lost}</b></div>`:''}
    <div class="fn-sources">
      <div class="chart-title" style="margin:22px 4px 14px">Откуда приходят лиды</div>
      ${sourceBreakdown(leads)}
    </div>`;
  body.querySelectorAll("[data-fp]").forEach(b=>b.onclick=()=>{funnelPeriod=b.dataset.fp;renderFunnel()});
  // запуск анимации после вставки
  requestAnimationFrame(()=>{body.querySelectorAll(".fn-seg-fill").forEach((el,i)=>{setTimeout(()=>el.classList.add("grown"),i*130+80)})});
}
function funnelSVG(order,counts){
  const W=340, segH=52, gap=8, labelH=0;
  const maxC=Math.max(1,...order.map(s=>counts[s]));
  const stages=order.map(s=>({st:stageById(s),c:counts[s]}));
  // ширина сегмента пропорциональна количеству (мин 22% чтобы текст влезал)
  const widthFor=c=>Math.max(0.26,c/maxC);
  const H=stages.length*(segH+gap);
  let svg=`<svg viewBox="0 0 ${W} ${H+4}" class="funnel-svg" xmlns="http://www.w3.org/2000/svg"><defs>`;
  stages.forEach((s,i)=>{svg+=`<linearGradient id="fg${i}" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="${s.st.color}"/><stop offset="100%" stop-color="${s.st.color}bb"/></linearGradient>`});
  svg+=`</defs>`;
  stages.forEach((s,i)=>{
    const y=i*(segH+gap);
    const wTop=widthFor(s.c)*W;
    const nextC=i<stages.length-1?stages[i+1].c:s.c;
    const wBot=widthFor(nextC)*W;
    const xTop=(W-wTop)/2, xBot=(W-wBot)/2;
    // трапеция
    const path=`M${xTop} ${y} L${xTop+wTop} ${y} L${xBot+wBot} ${y+segH} L${xBot} ${y+segH} Z`;
    // drop-off между этапами
    const prevC=i>0?stages[i-1].c:s.c;
    const dropPct=prevC>0?Math.round((1-s.c/prevC)*100):0;
    svg+=`<path class="fn-seg-fill" style="--fillw:1;transition-delay:${i*0.09}s" d="${path}" fill="url(#fg${i})" opacity="0" transform="scale(0.6 1)" transform-origin="${W/2}px ${y+segH/2}px"/>`;
    // текст: название + число
    svg+=`<text x="${W/2}" y="${y+segH/2-2}" text-anchor="middle" class="fn-seg-name">${s.st.name}</text>`;
    svg+=`<text x="${W/2}" y="${y+segH/2+16}" text-anchor="middle" class="fn-seg-count">${s.c}</text>`;
    // процент конверсии сбоку
    if(i>0){const convStep=prevC>0?Math.round(s.c/prevC*100):0;
      svg+=`<text x="${W-4}" y="${y-2}" text-anchor="end" class="fn-seg-conv">${convStep}%</text>`;}
  });
  svg+=`</svg>`;
  return `<div class="funnel-wrap">${svg}</div>`;
}
function sourceBreakdown(leads){
  const bySource={};LEAD_SOURCES.forEach(s=>bySource[s.id]=leads.filter(l=>l.source===s.id).length);
  const total=leads.length||1;
  const active=LEAD_SOURCES.filter(s=>bySource[s.id]>0).sort((a,b)=>bySource[b.id]-bySource[a.id]);
  if(!active.length)return `<div class="empty" style="padding:20px"><p>Нет данных за период.</p></div>`;
  return active.map((s,i)=>{const c=bySource[s.id],pct=Math.round(c/total*100);
    return `<div class="src-bar-row"><div class="src-bar-head"><span>${s.icon} ${s.name}</span><b>${c} · ${pct}%</b></div><div class="src-bar-track"><div class="src-bar-fill" style="width:${pct}%;transition-delay:${i*0.08}s"></div></div></div>`;
  }).join("");
}
function renderSettings(){
  const S=state.settings,body=document.getElementById("settings-body");
  body.innerHTML=`
    <div class="set-block"><h3>Тема</h3><div class="d">Тёмная или светлая.</div>
      <div class="seg" style="margin:0"><button data-th="dark" class="${S.theme==='dark'?'active':''}">🌙 Тёмная</button><button data-th="light" class="${S.theme==='light'?'active':''}">☀️ Светлая</button></div></div>
    <div class="set-block"><h3>Вибро-отклик</h3><div class="d">Вибрация на действиях.</div>
      <div class="toggle-row"><span style="font-size:13.5px;font-weight:600">Вибрация</span><div class="sw ${S.haptics?'on':''}" data-tg="haptics"><i></i></div></div></div>
    <div class="set-block"><h3>Синхронизация</h3><div class="d">Данные сохраняются в облаке и на телефоне. Это твой ключ аккаунта — данные привяжутся к нему даже после обновлений.</div>
      <div class="code-box"><span class="code-val" id="acc-code">${TG_ID||"подключается…"}</span><button class="pa copy" style="flex:0 0 auto;width:auto;padding:9px 14px" id="copy-code">📋</button></div>
      <div class="toggle-row"><span style="font-size:13.5px;font-weight:600">Статус</span><span style="font-size:13px;font-weight:800;color:${CLOUD_READY?'var(--accent)':'var(--muted)'}">${CLOUD_READY?'в облаке ✓':'локально'}</span></div></div>
    <button class="danger" id="wipe">Сбросить все данные</button>`;
  body.querySelectorAll("[data-th]").forEach(b=>b.onclick=()=>{S.theme=b.dataset.th;applyTheme();save();renderSettings()});
  body.querySelectorAll("[data-tg]").forEach(b=>b.onclick=()=>{S[b.dataset.tg]=!S[b.dataset.tg];save();renderSettings();if(S.haptics)buzz("light")});
  const cc=document.getElementById("copy-code");if(cc)cc.onclick=()=>{if(TG_ID)copyText(TG_ID)};
  document.getElementById("wipe").onclick=()=>{if(confirm("Удалить ВСЕ данные Punkt?")){state=JSON.parse(JSON.stringify(DEFAULTS));localStorage.removeItem("punkt_draft");save();show("home")}};
}

/* ===== NAV ===== */
function show(tab){
  document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
  const scr=document.getElementById("screen-"+tab);if(scr)scr.classList.add("active");
  const home=tab==="home";
  document.getElementById("back-btn").style.display=home?"none":"flex";
  document.getElementById("logo").style.display=home?"block":"none";
  document.getElementById("page-title").style.display=home?"none":"block";
  document.getElementById("page-title").textContent=TITLES[tab]||"";
  window.scrollTo(0,0);
  if(home)renderHome();if(tab==="write")renderWrite();if(tab==="posts")renderPosts();if(tab==="tasks")renderTasks();if(tab==="calendar")renderCalendar();if(tab==="analytics")renderAnalytics();if(tab==="threads")renderThreads();if(tab==="notes")renderNotes();if(tab==="leads")renderLeads();if(tab==="funnel")renderFunnel();if(tab==="settings")renderSettings();
}
document.getElementById("back-btn").onclick=()=>{buzz("light");show("home")};
function applyTheme(){document.documentElement.setAttribute("data-theme",state.settings.theme);try{const tg=window.Telegram&&window.Telegram.WebApp,c=state.settings.theme==="dark"?"#0c0c0e":"#dcdce2";tg&&tg.setHeaderColor&&tg.setHeaderColor(c);tg&&tg.setBackgroundColor&&tg.setBackgroundColor(c)}catch(e){}}
try{const tg=window.Telegram&&window.Telegram.WebApp;if(tg){tg.ready();tg.expand()}}catch(e){}
applyTheme();show("home");
initCloud();
